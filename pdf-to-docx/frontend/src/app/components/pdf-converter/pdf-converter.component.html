<div class="converter-card">
  <div class="header">
    <div class="icon-pdf">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
    </div>
    <h1>PDF a DOCX</h1>
    <p class="subtitle">Convierte tus archivos PDF a Word manteniendo formato e imágenes</p>
  </div>

  <!-- Zona de arrastrar y soltar -->
  <div
    class="drop-zone"
    [class.dragging]="arrastrando"
    [class.has-file]="archivoSeleccionado"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
  >
    <ng-container *ngIf="!archivoSeleccionado">
      <div class="drop-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <p class="drop-text">Arrastra tu archivo PDF aquí</p>
      <p class="drop-subtext">o</p>
      <label class="btn-select">
        Seleccionar archivo
        <input
          type="file"
          accept=".pdf,application/pdf"
          (change)="onArchivoSeleccionado($event)"
          hidden
        >
      </label>
    </ng-container>

    <ng-container *ngIf="archivoSeleccionado">
      <div class="file-info">
        <div class="file-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#e74c3c" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        </div>
        <div class="file-details">
          <span class="file-name">{{ archivoSeleccionado.name }}</span>
          <span class="file-size">{{ formatearTamano(archivoSeleccionado.size) }}</span>
        </div>
        <button class="btn-remove" (click)="reiniciar()" title="Quitar archivo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </ng-container>
  </div>

  <!-- Botón de conversión -->
  <button
    class="btn-convert"
    [disabled]="!archivoSeleccionado || estado === 'convirtiendo'"
    (click)="convertir()"
  >
    <ng-container *ngIf="estado !== 'convirtiendo'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="16 16 12 12 8 16"/>
        <line x1="12" y1="12" x2="12" y2="21"/>
        <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
      </svg>
      Convertir a DOCX
    </ng-container>
    <ng-container *ngIf="estado === 'convirtiendo'">
      <div class="spinner"></div>
      Convirtiendo...
    </ng-container>
  </button>

  <!-- Mensajes de estado -->
  <div class="message success" *ngIf="estado === 'exito'">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
      <polyline points="22 4 12 14.01 9 11.01"/>
    </svg>
    Archivo convertido y descargado exitosamente.
    <button class="btn-link" (click)="reiniciar()">Convertir otro archivo</button>
  </div>

  <div class="message error" *ngIf="estado === 'error'">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <line x1="15" y1="9" x2="9" y2="15"/>
      <line x1="9" y1="9" x2="15" y2="15"/>
    </svg>
    {{ mensajeError }}
    <button class="btn-link" (click)="reiniciar()">Intentar de nuevo</button>
  </div>
</div>
